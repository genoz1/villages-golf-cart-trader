<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>My Account | Villages Golf Cart Trader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="nav-root"></div>

<section class="page-hero" id="pageHero">
  <div class="inner">
    <div class="breadcrumb"><a href="index.html">Home</a><span>›</span> My Account</div>
    <h1 id="heroTitle">My Account</h1>
    <p id="heroSub">Loading…</p>
  </div>
</section>

<main class="container" id="mainContent" style="display:none">
  <div id="sellerView" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px">
      <h2>My Listings</h2>
      <div style="display:flex;gap:10px">
        <a href="sell.html" class="btn btn-gold">+ New Listing</a>
        <button class="btn btn-light" onclick="signOut()">Sign Out</button>
      </div>
    </div>
    <div id="sellerListings"></div>
  </div>

  <div id="dealerView" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px">
      <div>
        <h2>Dealer Dashboard</h2>
        <p class="muted" style="font-size:14px;margin-top:4px" id="dealerStatus"></p>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-gold" onclick="openModal('addCartModal')">+ Add Cart</button>
        <button class="btn btn-light" onclick="signOut()">Sign Out</button>
      </div>
    </div>
    <div id="dealerListings"></div>
  </div>
</main>

<div id="notLoggedIn" style="display:none">
  <div class="container-sm" style="text-align:center;padding:80px 24px">
    <div style="font-size:56px;margin-bottom:16px">🔒</div>
    <h2 style="margin-bottom:8px">Sign in to view your account</h2>
    <p class="muted" style="margin-bottom:28px">Access your listings, edit details, and manage your account.</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <a href="login.html" class="btn btn-green btn-lg">Sign In</a>
      <a href="sell.html" class="btn btn-gold btn-lg">Post a Listing</a>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal" style="position:relative;max-width:560px">
    <button class="modal-close" onclick="closeModal('editModal')">✕</button>
    <h2>Edit Listing</h2>
    <input type="hidden" id="editId">
    <div class="form-grid" style="margin-top:16px">
      <div class="form-group">
        <label>Price</label>
        <input class="field" id="editPrice" type="number" placeholder="$">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select class="field" id="editStatus">
          <option value="Active">Active</option>
          <option value="Sold">Sold</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Description</label>
        <textarea class="field" id="editDesc" rows="4"></textarea>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn btn-green" style="flex:1" onclick="saveEdit()">Save Changes</button>
      <button class="btn btn-light" onclick="closeModal('editModal')">Cancel</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addCartModal">
  <div class="modal" style="position:relative;max-width:600px;max-height:90vh;overflow-y:auto">
    <button class="modal-close" onclick="closeModal('addCartModal')">✕</button>
    <h2>Add Cart to Inventory</h2>
    <div class="form-grid" style="margin-top:16px">
      <div class="form-group">
        <label>Make *</label>
        <select class="field" id="acMake">
          <option value="">Select</option>
          <option>Club Car</option><option>EZGO</option><option>Yamaha</option>
          <option>ICON</option><option>Evolution</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Model *</label>
        <input class="field" id="acModel" placeholder="e.g. Onward">
      </div>
      <div class="form-group">
        <label>Year *</label>
        <select class="field" id="acYear">
          <option value="">Year</option>
          <option>2025</option><option>2024</option><option>2023</option><option>2022</option>
          <option>2021</option><option>2020</option><option>2019</option><option>2018</option>
          <option>2017</option><option>2016</option><option>2015</option><option>2014</option>
          <option>2013</option><option>2012</option><option>2011</option><option>2010</option>
          <option>2009</option><option>2008</option><option>2007</option><option>2006</option>
          <option>2005</option><option>2004</option><option>2003</option><option>2002</option>
          <option>2001</option><option>2000</option><option>1999</option><option>1998</option>
          <option>1997</option><option>1996</option><option>1995</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Price *</label>
        <input class="field" id="acPrice" type="number" placeholder="$">
      </div>
      <div class="form-group">
        <label>Power *</label>
        <select class="field" id="acPower">
          <option value="">Select</option>
          <option>Electric</option><option>Lithium</option><option>Gas</option>
        </select>
      </div>
      <div class="form-group">
        <label>Seats *</label>
        <select class="field" id="acSeats">
          <option value="">Select</option>
          <option>2</option><option>4</option><option>6</option>
        </select>
      </div>
      <div class="form-group">
        <label>Street Legal?</label>
        <select class="field" id="acStreetLegal">
          <option value="">Select</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>
      <div class="form-group">
        <label>Location *</label>
        <select class="field" id="acLocation">
          <option value="">Select</option>
          <option>The Villages</option><option>Lady Lake</option>
          <option>Wildwood</option><option>Oxford</option>
          <option>Leesburg</option><option>Other nearby</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Description *</label>
        <textarea class="field" id="acDesc" rows="4" placeholder="Describe the cart..."></textarea>
      </div>
      <div class="form-group full">
        <label>Photos (up to 20)</label>
        <div class="upload-area" onclick="document.getElementById('acPhotos').click()">
          <div style="font-size:24px;margin-bottom:6px">📷</div>
          <strong>Click to upload photos</strong>
          <input type="file" id="acPhotos" multiple accept="image/*" style="display:none" onchange="previewDealerPhotos(this)">
        </div>
        <div id="acPhotoPreview" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px"></div>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn btn-green btn-lg" style="flex:1" onclick="addDealerCart()">Add to Inventory</button>
      <button class="btn btn-light" onclick="closeModal('addCartModal')">Cancel</button>
    </div>
    <p id="addCartError" style="color:#d94040;font-size:13px;margin-top:10px;display:none"></p>
  </div>
</div>

<div id="footer-root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
document.getElementById('nav-root').innerHTML = renderNav('account.html');
document.getElementById('footer-root').innerHTML = renderFooter();
initNav();

const sb = window.supabase.createClient(
  'https://fkqapmylukshvotohqda.supabase.co',
  'sb_publishable_rQDfR2oKaVtRuCmts3BtbQ_d904l9zw'
);

let currentUser = null;
let currentProfile = null;

async function init() {
  const { data: { session } } = await sb.auth.getSession();

  if(!session) {
    document.getElementById('notLoggedIn').style.display = 'block';
    document.getElementById('pageHero').style.display = 'none';
    return;
  }

  currentUser = session.user;

  const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();

  if(!profile) {
    await sb.from('profiles').insert([{
      id:        currentUser.id,
      email:     currentUser.email,
      full_name: currentUser.user_metadata?.full_name || '',
      role:      'seller',
    }]);
    currentProfile = { role: 'seller', email: currentUser.email };
  } else {
    currentProfile = profile;
  }

  document.getElementById('mainContent').style.display = 'block';
  document.getElementById('heroTitle').textContent = currentProfile.role === 'dealer'
    ? `${currentProfile.full_name || 'Dealer'} Dashboard`
    : 'My Account';
  document.getElementById('heroSub').textContent = currentUser.email;

  if(currentProfile.role === 'dealer') {
    document.getElementById('dealerView').style.display = 'block';
    document.getElementById('dealerStatus').textContent = currentProfile.dealer_active
      ? '✅ Active subscription — unlimited listings'
      : '⚠️ Subscription inactive — listings hidden';
    loadDealerListings();
  } else {
    document.getElementById('sellerView').style.display = 'block';
    loadSellerListings();
  }
}

async function loadSellerListings() {
  const { data, error } = await sb.from('listings').select('*').eq('seller_email', currentUser.email).order('created_at', { ascending: false });
  const container = document.getElementById('sellerListings');

  if(error || !data || data.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🛺</div><h3>No listings yet</h3><p>Post your first cart and it will appear here.</p><a href="sell.html" class="btn btn-gold">Post Your Cart</a></div>`;
    return;
  }

  container.innerHTML = data.map(l => {
    const photo = l.photo_urls && l.photo_urls[0] ? l.photo_urls[0] : '';
    const daysLeft = l.days_left || 0;
    const pct = Math.max(0, Math.min(100, (daysLeft / 30) * 100));
    const fillClass = daysLeft <= 3 ? 'expired' : daysLeft <= 7 ? 'warn' : '';
    return `
    <div class="listing-row">
      <div class="listing-row-thumb" style="overflow:hidden;border-radius:10px">
        ${photo ? `<img src="${photo}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">` : '🛺'}
      </div>
      <div class="listing-row-body" style="flex:1">
        <h3>${l.title}</h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
          <span class="tag ${l.status === 'Active' ? '' : l.status === 'Sold' ? 'tag-grey' : 'tag-red'}">${l.status}</span>
          <span class="tag tag-gold">$${Number(l.price).toLocaleString()}</span>
        </div>
        <div class="days-bar" style="margin-top:8px">
          <div class="days-track"><div class="days-fill ${fillClass}" style="width:${pct}%"></div></div>
          <span style="font-size:12px;color:var(--muted);white-space:nowrap">${daysLeft} days left</span>
        </div>
        <div class="listing-row-actions">
          <button class="btn btn-light btn-sm" onclick="openEdit('${l.id}','${l.price}','${l.status}',\`${(l.description||'').replace(/`/g,"'")}\`)">✏️ Edit</button>
          <button class="btn btn-light btn-sm" onclick="deleteListing('${l.id}')">🗑️ Remove</button>
          ${l.status === 'Active' ? `<a href="listing-detail.html?id=${l.id}" class="btn btn-green btn-sm" target="_blank">👁 View</a>` : ''}
          ${l.status === 'Expired' ? `<button class="btn btn-gold btn-sm" onclick="renewListing('${l.id}')">🔄 Renew Free</button>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

async function loadDealerListings() {
  const { data, error } = await sb.from('listings').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
  const container = document.getElementById('dealerListings');

  if(error || !data || data.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🏢</div><h3>No inventory yet</h3><p>Add your first cart using the button above.</p></div>`;
    return;
  }

  container.innerHTML = data.map(l => {
    const photo = l.photo_urls && l.photo_urls[0] ? l.photo_urls[0] : '';
    return `
    <div class="listing-row">
      <div class="listing-row-thumb" style="overflow:hidden;border-radius:10px">
        ${photo ? `<img src="${photo}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">` : '🛺'}
      </div>
      <div class="listing-row-body" style="flex:1">
        <h3>${l.title}</h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
          <span class="tag tag-blue">🏢 Dealer</span>
          <span class="tag ${l.status === 'Active' ? '' : 'tag-grey'}">${l.status}</span>
          <span class="tag tag-gold">$${Number(l.price).toLocaleString()}</span>
        </div>
        <div class="listing-row-actions">
          <button class="btn btn-light btn-sm" onclick="openEdit('${l.id}','${l.price}','${l.status}',\`${(l.description||'').replace(/`/g,"'")}\`)">✏️ Edit</button>
          <button class="btn btn-light btn-sm" onclick="deleteListing('${l.id}')">🗑️ Remove</button>
          ${l.status === 'Active' ? `<a href="listing-detail.html?id=${l.id}" class="btn btn-green btn-sm" target="_blank">👁 View</a>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function openEdit(id, price, status, desc) {
  document.getElementById('editId').value = id;
  document.getElementById('editPrice').value = price;
  document.getElementById('editStatus').value = status;
  document.getElementById('editDesc').value = desc;
  openModal('editModal');
}

async function saveEdit() {
  const id     = document.getElementById('editId').value;
  const price  = parseInt(document.getElementById('editPrice').value);
  const status = document.getElementById('editStatus').value;
  const desc   = document.getElementById('editDesc').value;

  const { error } = await sb.from('listings').update({ price, status, description: desc }).eq('id', id);
  if(error) { showToast('Error saving changes.'); return; }
  closeModal('editModal');
  showToast('✅ Listing updated!');
  currentProfile.role === 'dealer' ? loadDealerListings() : loadSellerListings();
}

async function deleteListing(id) {
  if(!confirm('Remove this listing? This cannot be undone.')) return;
  const { error } = await sb.from('listings').delete().eq('id', id);
  if(error) { showToast('Error removing listing.'); return; }
  showToast('Listing removed.');
  currentProfile.role === 'dealer' ? loadDealerListings() : loadSellerListings();
}

async function renewListing(id) {
  const { error } = await sb.from('listings')
    .update({ status: 'Active', created_at: new Date().toISOString(), days_left: 30 })
    .eq('id', id);
  if(error) { showToast('Could not renew listing.'); return; }
  showToast('Listing renewed — live for another 30 days! 🎉');
  loadSellerListings();
}

function previewDealerPhotos(input) {
  const preview = document.getElementById('acPhotoPreview');
  preview.innerHTML = '';
  Array.from(input.files).slice(0,20).forEach(f => {
    const url = URL.createObjectURL(f);
    const div = document.createElement('div');
    div.style.cssText = 'width:64px;height:64px;border-radius:10px;overflow:hidden;border:1.5px solid var(--line)';
    div.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover">`;
    preview.appendChild(div);
  });
}

async function addDealerCart() {
  const errEl = document.getElementById('addCartError');
  errEl.style.display = 'none';

  const required = { acMake:'Make', acModel:'Model', acYear:'Year', acPrice:'Price', acPower:'Power', acSeats:'Seats', acLocation:'Location', acDesc:'Description' };
  for(const [id, label] of Object.entries(required)) {
    if(!document.getElementById(id).value) {
      errEl.textContent = `Please fill in: ${label}`;
      errEl.style.display = 'block';
      return;
    }
  }

  let photoUrls = [];
  const photoInput = document.getElementById('acPhotos');
  if(photoInput.files.length > 0) {
    try {
      const formData = new FormData();
      Array.from(photoInput.files).slice(0,20).forEach(f => formData.append('photos', f));
      const upRes  = await fetch('/api/upload-photos', { method:'POST', body: formData });
      const upData = await upRes.json();
      if(upData.urls) photoUrls = upData.urls;
    } catch(e) {}
  }

  const make  = document.getElementById('acMake').value;
  const model = document.getElementById('acModel').value;
  const year  = document.getElementById('acYear').value;

  const { error } = await sb.from('listings').insert([{
    title:        `${year} ${make} ${model}`,
    make, model, year,
    price:        parseInt(document.getElementById('acPrice').value),
    power:        document.getElementById('acPower').value,
    seats:        document.getElementById('acSeats').value,
    street_legal: document.getElementById('acStreetLegal').value === 'yes',
    location:     document.getElementById('acLocation').value,
    description:  document.getElementById('acDesc').value,
    seller_name:  currentProfile.full_name || '',
    seller_email: currentUser.email,
    photo_urls:   photoUrls,
    listing_type: 'Dealer',
    status:       currentProfile.dealer_active ? 'Active' : 'Hidden',
    user_id:      currentUser.id,
    is_sample:    false,
    days_left:    365,
  }]);

  if(error) {
    errEl.textContent = `Error: ${error.message}`;
    errEl.style.display = 'block';
    return;
  }

  closeModal('addCartModal');
  showToast('✅ Cart added to your inventory!');
  loadDealerListings();
}

async function signOut() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

init();
</script>
</body>
</html>
